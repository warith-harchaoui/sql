# =============================================================================
# i18n.yaml — SOURCE DE VÉRITÉ des chaînes traduites (GUI + prompts LLM).
#
# Tout le texte visible du front ET les consignes système des modèles vivent ICI,
# pas en dur dans le code (ni JS, ni Python). Le serveur charge ce fichier
# (backend/prompts.py), l'expose au front en JSON (/api/i18n) et le fournit aux
# approches. Pour ajouter/traduire une chaîne : on édite ce YAML, un point.
#
# Conventions (cf. l'i18n de roitelet) :
#   - clés en notation pointée, groupées par écran/fonction ;
#   - on traduit le SENS, pas mot à mot ;
#   - verbes à l'impératif pour les boutons ; erreurs orientées « quoi faire » ;
#   - substitution {nom} côté code (t(key, vars)).
# =============================================================================

